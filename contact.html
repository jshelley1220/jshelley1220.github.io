<body class="bg-slate-50 text-[#071e17] antialiased selection:bg-[#dfc493]/30">

            <span class="text-xl tracking-tight flex items-baseline">

</button>

<div id="mobileMenu" class="hidden md:hidden absolute top-20 left-0 w-full bg-[#061a14]/95 backdrop-blur-md border-b border-white/10">

        <a href="about.html" class="text-slate-200">About</a>
        <a href="contact.html" class="text-slate-200">Contact</a>

<script>
document.getElementById("menuBtn")?.addEventListener("click", () => {
const menu = document.getElementById("mobileMenu");
menu.classList.toggle("hidden");
});
